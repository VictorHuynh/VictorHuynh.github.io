<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<style>
    body, html {
  height: 100%;
  margin: 0;
}

.bg {
  background-image: url("https://images.pexels.com/photos/37728/pexels-photo-37728.jpeg?auto=compress&cs=tinysrgb&h=650&w=940");

  height: 100%; 

  background-position: center;
  background-repeat: no-repeat;
  background-size: cover;
}
.container {
  position: relative;
  text-align: center;
  color: rgb(0, 0, 0);
}

.top-left {
  position: absolute;
  top: 8px;
  left: 16px;
}

.top-right {
  position: absolute;
  top: 8px;
  right: 16px;
}

.centered {
  position: absolute;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
}
</style>
</head>
<body>

<div class="container">
  <img src="https://images.pexels.com/photos/37728/pexels-photo-37728.jpeg?auto=compress&cs=tinysrgb&h=650&w=940" alt="Cloud" style="width:100%;">
  <div class="top-left">Top Left</div>
  <div class="top-right">Top Right</div>
  <div class="centered">Centered</div>
  <div class="bg"></div>
</div>
</body>
</html>
