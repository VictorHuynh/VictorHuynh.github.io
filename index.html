<!DOCTYPE html>
<html>
<head>
<style>
ul {
  list-style-type: none;
  margin: 0;
  padding: 0;
  overflow: hidden;
}

a {  
  float: right;
  display: block;
  color: #DCDCDC;
  text-align: center;
  padding: 10px 25px;
  text-decoration: none;
  font-family: Courier New, monospace;
  transition: 0.3s;
}
a:hover {
  color: black;
  text-shadow: 5px 5px 2px #cccccc;
}

.center p {
  color: white;
  margin: 0;
  position: absolute;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  font-size: 40px;
  font-family: Courier New, monospace;
  animation-name: examplel; 
  animation-delay: 1.3s;
  animation-duration: 3s;
  animation-fill-mode: forwards;
}
.center o {
  color: white;
  margin: 0;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  font-family: Courier New, monospace;
  position: absolute;
  animation-name: example; 
  animation-duration: 2s;
  animation-fill-mode: forwards;
}
@keyframes example {
  from {top: 20%;}
  to {top: 40%; 
  color: black;}
}
@keyframes examplel {
  from {}
  to {color: black;}
}

.center l {
  margin: 0;
  position: absolute;
  top: 30px;
  left: 30px;
  transform: translate(-50%, -50%);
  }

</style>
</head>
