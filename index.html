<!DOCTYPE html>
<html>
<head>
<style>
ul {
  list-style-type: none;
  margin: 0;
  padding: 0;
  overflow: hidden;
}

li a {  
  float: right;
  display: block;
  color: #DCDCDC;
  text-align: center;
  padding: 10px 25px;
  text-decoration: none;
  font-family: Courier New, monospace;
}
li a:hover:not(.active) {
  text-decoration: underline;
  color: black;
}

.center p {
	color: white;
  margin: 0;
  position: absolute;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  font-size: 40px;
  font-family: Courier New, monospace;
  animation-name: examplel; 
  animation-delay: 1.5s;
  animation-duration: 2s;
  animation-fill-mode: forwards;
}
.center o {
  color: white;
  margin: 0;
  left: 46%;
  transform: translate(-50%, -50%);
  font-family: Courier New, monospace;
  position: relative;
  animation-name: example; 
  animation-duration: 2s;
  animation-fill-mode: forwards;
}
@-webkit-keyframes example {
  from {top: 50px;}
  to {top: 150px; 
  color: black;}
}
@-webkit-keyframes examplel {
  from {top: 250px;}
  to {top: 250px; 
  color: black;}
}

.center l {
  margin: 0;
  position: absolute;
  top: 30px;
  left: 30px;
  transform: translate(-50%, -50%);
  }

</style>
</head>
<body>

<ul>    
	<li><a href="#contact">Contact</a></li> 
    <li><a href="#resume">Resume</a></li>
    <li><a href="#about">About</a></li>
    <li><a href="#home">Home</a></li>
    
</ul>
<div class="center">
  <p>── VICTOR HUYNH ──</p>
  <o>Hi, I'm</o>
  <l><img src="https://i.postimg.cc/50080vkH/VH.jpg" width=25px height= 17px></l>
</div>


</body>
</html>
