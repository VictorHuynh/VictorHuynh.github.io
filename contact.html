<style>

ul {
  list-style-type: none;
}

a {  
  float: right;
  display: block;
  color: #DCDCDC;
  text-align: center;
  padding: 10px 25px;
  text-decoration: none;
  font-family: Courier New, monospace;
  transition: 0.3s;
}

a:hover {
  color: black;
  text-shadow: 5px 5px 2px #cccccc;
  font-size: 17px;
}

l {
  margin: 0;
  position: absolute;
  top: 30px;
  left: 30px;
  transform: translate(-50%, -50%);
  opacity: 0.1;
  transition: 0.3s;
  }
  
l:hover {
  opacity: 1;
}
t:hover {
  text-shadow: 5px 5px 2px #cccccc;
  font-size: 22px;
}
e:hover {
  text-shadow: 5px 5px 2px #cccccc;
  font-size: 22px;
}
w {
  color: white;
  margin: 0;
  top: 30%;
  left: 50%;
  transform: translate(-50%, -50%);
  font-family: Courier New, monospace;
  font-size: 40px;
  position: absolute;
  animation-name: w; 
  animation-duration: 3s;
  animation-fill-mode: forwards;
}
e {
  color: white;
  margin: 0;
  top: 40%;
  left: 50%;
  transform: translate(-50%, -50%);
  font-family: Courier New, monospace;
  font-size: 20px;
  position: absolute;
  animation-name: e; 
  animation-duration: 2s;
  animation-delay: 1.5s;
  animation-fill-mode: forwards;
  transition: 0.3s;
}
r {
  color: white;
  margin: 0;
  top: 60%;
  left: 50%;
  transform: translate(-50%, -50%);
  font-family: Courier New, monospace;
  font-size: 40px;
  position: absolute;
  animation-name: r; 
  animation-duration: 3s;
  animation-fill-mode: forwards;
}

t {
  color: white;
  margin: 0;
  top: 70%;
  left: 50%;
  transform: translate(-50%, -50%);
  font-family: Courier New, monospace;
  font-size: 20px;
  position: absolute;
  animation-name: e; 
  animation-delay: 1.5s;
  animation-duration: 2s;
  animation-fill-mode: forwards;
  transition: 0.3s;
}

@keyframes w {
  from {left: 20%;}
  to {left: 50%; 
  color: black;}
}
@keyframes e {
  from {}
  to {color: black;}
}
@keyframes r {
  from {left: 80%;}
  to {left: 50%; 
  color: black;}
}
